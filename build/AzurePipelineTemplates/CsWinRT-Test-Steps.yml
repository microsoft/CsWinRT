parameters: 
  - name: "BuildConfiguration"
    type: string
  - name: "BuildPlatform"
    type: string
    
steps:
# Enable GC stress
  - task: PowerShell@2
    displayName: Enable GC Stress
    condition: and(succeeded(), eq(variables['_RunGCStress'], 'true'))
    inputs:
      targetType: inline
      script: |
        Write-Host "##vso[task.setvariable variable=DOTNET_GCStress;]0xC"

# Run Unit Tests
  - task: DotNetCoreCLI@2
    displayName: Run Unit Tests
    condition: and(succeeded(), or(eq(variables['BuildPlatform'], 'x86'), eq(variables['BuildPlatform'], 'x64')))
    inputs:
      command: test
      projects: 'src/Tests/UnitTest/UnitTest.csproj'
      arguments: --diag $(Build.ArtifactStagingDirectory)\unittest\test.log --no-build --logger xunit;LogFilePath=UNITTEST-$(Build.BuildNumber).xml /nologo /m /p:platform=$(BuildPlatform);configuration=$(BuildConfiguration);CIBuildReason=CI -- RunConfiguration.TreatNoTestsAsError=true
      testRunTitle: Unit Tests

# Run Host Tests
  - task: CmdLine@2
    displayName: Run Host Tests
    condition: and(succeeded(), or(eq(variables['BuildPlatform'], 'x86'), eq(variables['BuildPlatform'], 'x64')))
    continueOnError: True
    inputs:
      workingDirectory: $(Build.SourcesDirectory)\src
      script: |
        dir _build\$(BuildPlatform)\$(BuildConfiguration)\HostTest\bin
        _build\$(BuildPlatform)\$(BuildConfiguration)\HostTest\bin\HostTest.exe --gtest_output=xml:HOSTTEST-$(Build.BuildNumber).xml 

# Run Source Generator Tests  
  - task: CmdLine@2
    displayName: Run Source Generator Tests
    condition: and(succeeded(), or(eq(variables['BuildPlatform'], 'x86'), eq(variables['BuildPlatform'], 'x64')))
    continueOnError: True
    inputs:
      workingDirectory: $(Build.SourcesDirectory)\src
      script: |
        dir _build\$(BuildPlatform)\$(BuildConfiguration)\AuthoringConsumptionTest\bin
        _build\$(BuildPlatform)\$(BuildConfiguration)\AuthoringConsumptionTest\bin\AuthoringConsumptionTest.exe --gtest_output=xml:AUTHORINGTEST-$(Build.BuildNumber).xml 

# Run WUX Tests
  - task: CmdLine@2
    displayName: Run WUX Tests
    condition: and(succeeded(), or(eq(variables['BuildPlatform'], 'x86'), eq(variables['BuildPlatform'], 'x64')))
    continueOnError: True
    inputs:
      workingDirectory: $(Build.SourcesDirectory)\src
      script: |
        dir _build\$(BuildPlatform)\$(BuildConfiguration)\AuthoringWuxConsumptionTest\bin
        _build\$(BuildPlatform)\$(BuildConfiguration)\AuthoringWuxConsumptionTest\bin\AuthoringWuxConsumptionTest.exe --gtest_output=xml:AUTHORINGWUXTEST-$(Build.BuildNumber).xml 

# Run Functional Tests
  - template: CsWinRT-FunctionalTest-Steps.yml@self
    parameters:
      BuildConfiguration: $(BuildConfiguration)
      BuildPlatform: $(BuildPlatform) 

  # Find MSBuild (hosted agent has VS installed)
  - pwsh: |
      $vs = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.Component.MSBuild -property installationPath
      if (-not $vs) { throw "VS not found on agent" }
      $msbuild = Join-Path $vs 'MSBuild\Current\Bin\MSBuild.exe'
      Write-Host "##vso[task.setvariable variable=MSBuildPath]$msbuild"
      Write-Host "MSBuild: $msbuild"
    displayName: Locate MSBuild
    condition: and(succeeded(), or(eq(variables['BuildPlatform'], 'x86'), eq(variables['BuildPlatform'], 'x64')))

  # Publish NativeAOT test project
  - pwsh: |
      New-Item -ItemType Directory -Force -Path '$(PublishDir)' | Out-Null
      & '$(MSBuildPath)' `
        '$(Build.SourcesDirectory)\cswinrt.slnx' `
        -restore `
        /t:Tests\UnitTest:Publish `
        /p:Platform=$(BuildPlatform);Configuration=$(BuildConfiguration);RuntimeIdentifier=$(RuntimeIdentifier);GenerateTestProjection=true `
        /p:SolutionDir='$(Build.SourcesDirectory)\' `
        /p:AppBuildTFMs=net10.0 `
        /p:PublishDir='$(PublishDir)\' `
        /bl:'$(Build.ArtifactStagingDirectory)\publish.binlog'
    displayName: Publish UnitTest (NativeAOT)
    condition: and(succeeded(), or(eq(variables['BuildPlatform'], 'x86'), eq(variables['BuildPlatform'], 'x64')))
    
  # Run the published test executable and emit TRX
  - pwsh: |
      New-Item -ItemType Directory -Force -Path '$(TestResultsDir)' | Out-Null

      $exe = Get-ChildItem '$(PublishDir)' -Filter UnitTest.exe -Recurse | Select-Object -First 1
      if (-not $exe) { throw "UnitTest.exe not found under $(PublishDir)" }

      Write-Host "Running: $($exe.FullName)"
      & $exe.FullName --report-trx --results-directory '$(TestResultsDir)'

      # Ensure we fail the step if tests failed (nonzero exit)
      if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
    displayName: Run NativeAOT tests (emit TRX)
    condition: and(succeeded(), or(eq(variables['BuildPlatform'], 'x86'), eq(variables['BuildPlatform'], 'x64')))

  # Publish test results to the Tests tab
  - task: PublishTestResults@2
    displayName: Publish TRX to Azure Pipelines
    condition: and(succeededOrFailed(), or(eq(variables['BuildPlatform'], 'x86'), eq(variables['BuildPlatform'], 'x64')))
    inputs:
      testResultsFormat: 'VSTest'   # VSTest == TRX (also works for MTP-generated TRX)
      testResultsFiles: '**/*.trx'
      searchFolder: '$(TestResultsDir)'
      mergeTestResults: true
      failTaskOnFailedTests: true

# Disable GC stress
  - task: PowerShell@2
    displayName: Disable GC Stress
    condition: and(succeeded(), eq(variables['_RunGCStress'], 'true'))
    inputs:
      targetType: inline
      script: |
        Write-Host "##vso[task.setvariable variable=DOTNET_GCStress;]0x0"

  - task: CopyFiles@2
    displayName: Publish Test Log
    condition: and(failed(), or(eq(variables['BuildPlatform'], 'x86'), eq(variables['BuildPlatform'], 'x64')))
    inputs:
      SourceFolder: $(Build.ArtifactStagingDirectory)\unittest
      Contents: |
        test.log
      TargetFolder: $(StagingFolder)\UnitTest