variables:
- name: MajorVersion
  value: 3
- name: MinorVersion
  value: 0
- name: PatchVersion
  value: 0
- name: WinRT.Runtime.AssemblyVersion
  value: '3.0.0.0'

- name: NoSamples
  value: 'false'
- name: _DotnetVersion
  value: '10.0.104'
  
  # This 'coalesce' pattern allows the yml to define a default value for a variable but allows the value to be overridden at queue time.
  # E.g. '_IsRelease' defaults to empty string, but if 'IsRelease' is set at queue time that value will be used.

- name: _IsRelease
  value: $[coalesce(variables.IsRelease, '')]
- name: _RunBenchmarks
  value: $[coalesce(variables.RunBenchmarks, 'false')]
- name: _RunGCStress
  value: $[coalesce(variables.RunGCStress, 'false')]

# Benchmark configuration
# Known-good CsWinRT 3.x version used as baseline for regression benchmarks.
# Override at queue time by setting BenchmarkBaselineCsWinRT3Version.
- name: _BenchmarkBaselineCsWinRT3Version
  value: $[coalesce(variables.BenchmarkBaselineCsWinRT3Version, '3.0.0-prerelease-ci.260302.3')]
# CsWinRT 2.x version used as baseline for compare-versions benchmarks.
- name: _BenchmarkCsWinRT2Version
  value: $[coalesce(variables.BenchmarkCsWinRT2Version, '2.3.0-prerelease.251115.2')]
# Benchmark mode: 'compare-versions' or 'regression'
- name: _BenchmarkMode
  value: $[coalesce(variables.BenchmarkMode, 'regression')]
# CsWinRT 3.x version to benchmark as "current" in regression mode.
# Override at queue time by setting BenchmarkCurrentCsWinRT3Version to the version under test.
# Defaults to the baseline version (i.e., no-op comparison) when not overridden.
- name: _BenchmarkCurrentCsWinRT3Version
  value: $[coalesce(variables.BenchmarkCurrentCsWinRT3Version, variables._BenchmarkBaselineCsWinRT3Version)]
# Additional NuGet feed for benchmark packages.
# Set BenchmarkNuGetFeed at queue time to a feed URL to use it alongside the default feed.
- name: _BenchmarkNuGetFeed
  value: $[coalesce(variables.BenchmarkNuGetFeed, '')]
# Windows SDK package version for benchmarks.
# Override at queue time by setting BenchmarkWindowsSdkPackageVersion.
- name: _BenchmarkWindowsSdkPackageVersion
  value: $[coalesce(variables.BenchmarkWindowsSdkPackageVersion, '10.0.26100.7706-preview.ge-release-svc-prod3')]

- name: _PublishCsWinMD
  value: $[coalesce(variables.PublishCsWinMD, 'false')]
- name: _PublishFunctionalTests
  value: $[coalesce(variables.PublishFunctionalTests, 'false')]

- name: _GenerateSdkProjection
  value: $[coalesce(variables.GenerateSdkProjection, 'false')]

# SDK Contracts package versions for each Windows SDK build.
# Override at queue time by setting the corresponding variable (e.g. SdkPackageVersion_26100).
- name: _SdkPackageVersion_17763
  value: $[coalesce(variables.SdkPackageVersion_17763, '10.0.17763.1000')]
- name: _SdkPackageVersion_18362
  value: $[coalesce(variables.SdkPackageVersion_18362, '10.0.18362.2007')]
- name: _SdkPackageVersion_19041
  value: $[coalesce(variables.SdkPackageVersion_19041, '10.0.19041.2')]
- name: _SdkPackageVersion_22000
  value: $[coalesce(variables.SdkPackageVersion_22000, '10.0.22000.197')]
- name: _SdkPackageVersion_22621
  value: $[coalesce(variables.SdkPackageVersion_22621, '10.0.22621.3233')]
- name: _SdkPackageVersion_26100
  value: $[coalesce(variables.SdkPackageVersion_26100, '10.0.26100.7705')]

# Additional NuGet feed for SDK Contracts packages.
# Set SdkNuGetFeed at queue time to a feed URL to use it alongside the default feed.
- name: _SdkNuGetFeed
  value: $[coalesce(variables.SdkNuGetFeed, '')]

# Additional SDK build for a new version not yet in the default list.
# Set both variables at queue time to build a projection for the new version.
- name: _AdditionalSdkBuild
  value: $[coalesce(variables.AdditionalSdkBuild, '')]
- name: _AdditionalSdkPackageVersion
  value: $[coalesce(variables.AdditionalSdkPackageVersion, '')]
