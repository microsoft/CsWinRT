steps:
- checkout: self
  clean: true
  persistCredentials: true
    
# Clone TestWinRT
- task: CmdLine@2
  displayName: Clone TestWinRT
  inputs: 
    script: get_testwinrt.cmd
    workingDirectory: $(Build.SourcesDirectory)\src

- task: UseDotNet@2
  displayName: Use .NET Core SDK 10.0
  inputs:
    packageType: sdk
    version: 10.x
    installationPath: $(LocalAppData)\Microsoft\dotnet\

# Verify .NET SDK
- task: CmdLine@2
  displayName: Verify .NET SDK
  inputs:
    workingDirectory: $(Build.SourcesDirectory)
    script: |
      where dotnet
      dotnet --info

# Run Benchmarks
- task: CmdLine@2
  displayName: Run Benchmarks for x64 Release
  inputs:
    workingDirectory: $(Build.SourcesDirectory)\src
    script: |
      if "%VSCMD_VER%"=="" (
        pushd c:
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" >nul 2>&1
        popd
      )

      benchmark.cmd

# Component Detection
- task: ComponentGovernanceComponentDetection@0
  displayName: Component Detection
