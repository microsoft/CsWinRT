parameters: 
  - name: "BuildConfiguration"
    type: string
  - name: "BuildPlatform"
    type: string
  - name: SetupForBuildOnly
    type: boolean
    default: false
  - name: SdkProjectionVersions
    type: object
    default:
      - 17763
      - 18362
      - 19041
      - 22000
      - 22621
      - 26100
    
steps:
  # Setup remote for source link to pick up
  - task: PowerShell@2
    condition: eq(variables['AdoMirrorBuild'], 'true')
    inputs:
      targetType: 'inline'
      script: |
        git remote add github "https://github.com/microsoft/cswinrt.git"
      workingDirectory: $(Build.SourcesDirectory)

  # Download procdump
  - task: PowerShell@2
    displayName: Download procdump
    enabled: false
    inputs:
      targetType: inline
      script: |
        mkdir $env:Agent_TempDirectory\procdump
      
        Invoke-WebRequest -Uri https://download.sysinternals.com/files/Procdump.zip -OutFile $env:Agent_TempDirectory\procdump\Procdump.zip
        
        Expand-Archive -Path $env:Agent_TempDirectory\procdump\Procdump.zip $env:Agent_TempDirectory\procdump\

        set PROCDUMP_PATH=$env:Agent_TempDirectory\procdump\

        Write-Host ##vso[task.setvariable variable=PATH;]${env:Agent_TempDirectory}\procdump;${env:PATH};

# Install x86 first so that it isn't the first on PATH.
  - task: UseDotNet@2
    displayName: Use .NET Core SDK 10.0 x86
    condition: eq(variables['BuildPlatform'], 'x86')
    inputs:
      packageType: sdk
      version: $(_DotnetVersion)
      installationPath: $(LocalAppData)\Microsoft\dotnet\x86\
    env:
      PROCESSOR_ARCHITECTURE: x86

# Install arm64 due to arm64 hosting binaries are only available there.
# Installing using dotnet script given UseDotNet@2 doesn't work with arm64.
  - task: PowerShell@2
    displayName: Install .NET Core SDK 10.0 arm64
    condition: eq(variables['BuildPlatform'], 'arm64')
    inputs:
      targetType: inline
      failOnStderr: true
      script: |          
        [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12;          
        &([scriptblock]::Create((Invoke-WebRequest -UseBasicParsing 'https://dot.net/v1/dotnet-install.ps1'))) -Version "$(_DotnetVersion)" -Architecture "arm64" -InstallDir "$(LocalAppData)\Microsoft\dotnet\arm64\"

  - task: UseDotNet@2
    displayName: Use .NET Core SDK 10.0
    inputs:
      packageType: sdk
      version: $(_DotnetVersion)
      installationPath: $(LocalAppData)\Microsoft\dotnet\

# Set Dotnet path for x86.  The normal one already gets set above.
  - task: PowerShell@2
    displayName: Set DotNet paths for x86
    condition: eq(variables['BuildPlatform'], 'x86')
    inputs:
      targetType: inline
      script: |
        Write-Host "##vso[task.setvariable variable=DOTNET_ROOT(x86);]$env:DOTNET_ROOT\x86\"

  # Verify .NET SDK
  - task: CmdLine@2
    displayName: Verify .NET SDK
    inputs:
      workingDirectory: $(Build.SourcesDirectory)
      script: |
        where dotnet
        dotnet --info

  # Parse Version
  - task: CmdLine@2
    displayName: Parse Version
    inputs:
      workingDirectory: $(Build.SourcesDirectory)
      script: |
        rem Parse the build-generated Build.BuildNumber into components that 
        rem can be recombined for version resources, nuget packages, etc.
        @echo off
      
        rem Encode the build date/rev into a 16 bit value for resource versions
        if "$(PrereleaseVersion)"=="" (
          set RevisionBase=30000
        ) else (
          set RevisionBase=0
        )

        for /f "tokens=4,5 delims=." %%i in ("$(Build.BuildNumber)") do set BuildMetadata=%%i.%%j & set /a BuildRevision=%RevisionBase%+(((%%i/10000)-20)*366+((%%i)%%10000)/100*31+((%%i)%%100))*10+%%j

        set VersionNumber=$(MajorVersion).$(MinorVersion).$(PatchVersion).%BuildRevision%

        if "$(PrereleaseVersion)"=="" (
          set NugetVersion=$(MajorVersion).$(MinorVersion).$(PatchVersion)
        ) else (
          set NugetVersion=$(Build.BuildNumber)
        )

        rem Export generated version numbers back for subsequent tasks
        echo ##vso[task.setvariable variable=BuildMetadata;]%BuildMetadata%
        echo ##vso[task.setvariable variable=BuildRevision;]%BuildRevision%
        echo ##vso[task.setvariable variable=VersionNumber;]%VersionNumber%
        echo ##vso[task.setvariable variable=NugetVersion;]%NugetVersion%

  - task: NuGetAuthenticate@1

  - task: VSBuild@1
    displayName: Restore cswinrt.slnx
    inputs:
      solution: $(Build.SourcesDirectory)\src\cswinrt.slnx
      msbuildArgs: /p:RestorePackagesConfig=true /t:restore /p:CIBuildReason=CI
      platform: $(BuildPlatform)
      configuration: $(BuildConfiguration)

  - task: NuGetCommand@2
    displayName: NuGet restore testwinrt.sln
    inputs:
      command: 'restore'
      restoreSolution: '$(Build.SourcesDirectory)\src\testwinrt\test.sln'
      feedsToUse: config
      nugetConfigPath: NuGet.config

  - task: CmdLine@2
    displayName: Set CsWinRT Build Tools Arch
    inputs:
      workingDirectory: $(Build.SourcesDirectory)
      script: |
        rem We use x64 build tools on x86.
        set CsWinRTBuildToolsArch=$(BuildPlatform)
        if "$(BuildPlatform)"=="x86" (
          set CsWinRTBuildToolsArch=x64
        )
        echo ##vso[task.setvariable variable=CsWinRTBuildToolsArch;]%CsWinRTBuildToolsArch%

  - ${{ if eq(parameters.SetupForBuildOnly, false) }}:

# PDBs being copied for each project reference are causing out of disk space issues in the pipeline.  Making use of AllowedReferenceRelatedFileExtensions to avoid them being copied.
    - task: VSBuild@1
      displayName: Build cswinrt.slnx
      inputs:
        solution: $(Build.SourcesDirectory)\src\cswinrt.slnx
        msbuildArgs: /restore /p:CIBuildReason=CI,VersionNumber=$(VersionNumber),VersionString=$(Build.BuildNumber),AssemblyVersionNumber=$(WinRT.Runtime.AssemblyVersion),GenerateTestProjection=true,AllowedReferenceRelatedFileExtensions=".xml;.pri;.dll.config;.exe.config",PublishBuildTool=true,BuildToolArch=$(CsWinRTBuildToolsArch) /bl:$(Build.SourcesDirectory)\cswinrt.binlog
        platform: $(BuildPlatform)
        configuration: $(BuildConfiguration)

    # Stage BinLog
    - task: CopyFiles@2
      displayName: Stage BinLog
      condition: failed()
      inputs:
        SourceFolder: $(Build.SourcesDirectory)
        Contents: cswinrt.binlog
        TargetFolder: $(StagingFolder)\binlog

    # Stage merged projection
    - task: ArchiveFiles@2
      displayName: Stage merged projection
      condition: failed()
      inputs:
        rootFolderOrFile: $(temp)\CsWinRT\
        includeRootFolder: false
        sevenZipCompression: 5
        archiveFile: $(StagingFolder)\merged\sources.zip

    # Stage Windows projection
    - task: ArchiveFiles@2
      displayName: Stage Windows projection
      condition: and(succeeded(), eq(variables['PublishGeneratedFiles'], 'true'))
      inputs:
        rootFolderOrFile: $(Build.SourcesDirectory)\Projections\Windows\Generated Files
        includeRootFolder: false
        sevenZipCompression: 5
        archiveFile: $(StagingFolder)\Windows\sources.zip

    # Stage CsWinRT
    - task: CopyFiles@2
      displayName: Stage CsWinRT
      condition: and(succeeded(), and(eq(variables['BuildPlatform'], 'x86'), eq(variables['BuildConfiguration'], 'release')))
      inputs:
        SourceFolder: $(Build.SourcesDirectory)\src\_build\$(BuildPlatform)\$(BuildConfiguration)\cswinrt\bin
        Contents: |
          cswinrt.exe
          cswinrt.pdb
        TargetFolder: $(StagingFolder)\native

    # Stage WinRT.Interop.winmd
    - task: CopyFiles@2
      displayName: Stage WinRT.Interop.winmd
      condition: and(succeeded(), and(eq(variables['BuildPlatform'], 'x86'), eq(variables['BuildConfiguration'], 'release')))
      continueOnError: True
      inputs:
        SourceFolder: $(Build.SourcesDirectory)\src\_build\$(BuildPlatform)\$(BuildConfiguration)\cswinrt\bin
        Contents: WinRT.Interop.winmd
        TargetFolder: $(StagingFolder)\native

    # Stage WinRT.Host
    - task: CopyFiles@2
      displayName: Stage WinRT.Host
      condition: and(succeeded(), eq(variables['BuildConfiguration'], 'release'))
      continueOnError: True
      inputs:
        SourceFolder: $(Build.SourcesDirectory)\src\_build\$(BuildPlatform)\$(BuildConfiguration)\WinRT.Host\bin
        Contents: |
          WinRT.Host.dll
          WinRT.Host.pdb
          WinRT.Host.dll.mui
        TargetFolder: $(StagingFolder)\native

    # Stage Source Generator (Roslyn 4.12)
    - task: CopyFiles@2
      displayName: Stage Source Generator
      condition: and(succeeded(), eq(variables['BuildPlatform'], 'x86'), eq(variables['BuildConfiguration'], 'release'))
      inputs:
        SourceFolder: $(Build.SourcesDirectory)\src\Authoring\WinRT.SourceGenerator2\bin\$(BuildConfiguration)\net10.0
        Contents: |
          WinRT.SourceGenerator2.dll
          WinRT.SourceGenerator2.pdb
        TargetFolder: $(StagingFolder)\net10.0

    # Stage Net10.0
    - task: CopyFiles@2
      displayName: Stage Net10.0
      condition: and(succeeded(), eq(variables['BuildPlatform'], 'x86'), eq(variables['BuildConfiguration'], 'release'))
      inputs:
        SourceFolder: $(Build.SourcesDirectory)\src\WinRT.Runtime2\bin\$(BuildConfiguration)\net10.0
        Contents: |
          WinRT.Runtime.dll
          WinRT.Runtime.pdb
          WinRT.Runtime.xml
        TargetFolder: $(StagingFolder)\net10.0

    # Stage WinRT.Host.Shim
    - task: CopyFiles@2 
      displayName: Stage WinRT.Host.Shim
      condition: and(succeeded(), eq(variables['BuildPlatform'], 'x86'), eq(variables['BuildConfiguration'], 'release'))
      enabled: false
      continueOnError: True
      inputs:
        SourceFolder: $(Build.SourcesDirectory)\src\Authoring\WinRT.Host.Shim\bin\$(BuildConfiguration)\net10.0
        Contents: |
          WinRT.Host.Shim.dll
          WinRT.Host.Shim.pdb
        TargetFolder: $(StagingFolder)\net10.0

    # Stage CsWinMD
    - task: CopyFiles@2
      displayName: Stage CsWinMD
      condition: and(succeeded(), eq(variables['BuildPlatform'], 'x86'), eq(variables['BuildConfiguration'], 'release'))
      inputs:
        SourceFolder: $(Build.SourcesDirectory)\src\Authoring\cswinmd\bin\$(BuildConfiguration)\net10.0
        Contents: |
          CsWinMD.dll
          CsWinMD.exe
          CsWinMD.pdb
          CsWinMD.deps.json
          CsWinMD.runtimeconfig.json
          Microsoft.CodeAnalysis.CSharp.dll
          Microsoft.CodeAnalysis.dll
        TargetFolder: $(StagingFolder)\net10.0\CsWinMD

    # Stage build tools
    - task: CopyFiles@2
      displayName: Stage cswinrtinteropgen
      condition: and(succeeded(), or(eq(variables['BuildPlatform'], 'x64'), eq(variables['BuildPlatform'], 'arm64')), eq(variables['BuildConfiguration'], 'release'))
      inputs:
        SourceFolder: $(Build.SourcesDirectory)\src\WinRT.Interop.Generator\bin\$(BuildConfiguration)\net10.0\win-$(BuildPlatform)\publish
        Contents: |
          cswinrtinteropgen.exe
          cswinrtinteropgen.pdb
        TargetFolder: $(StagingFolder)\net10.0\native

    - task: CopyFiles@2
      displayName: Stage cswinrtimplgen
      condition: and(succeeded(), or(eq(variables['BuildPlatform'], 'x64'), eq(variables['BuildPlatform'], 'arm64')), eq(variables['BuildConfiguration'], 'release'))
      inputs:
        SourceFolder: $(Build.SourcesDirectory)\src\WinRT.Impl.Generator\bin\$(BuildConfiguration)\net10.0\win-$(BuildPlatform)\publish
        Contents: |
          cswinrtimplgen.exe
          cswinrtimplgen.pdb
        TargetFolder: $(StagingFolder)\net10.0\native

    - task: CopyFiles@2
      displayName: Stage cswinrtprojectiongen
      condition: and(succeeded(), or(eq(variables['BuildPlatform'], 'x64'), eq(variables['BuildPlatform'], 'arm64')), eq(variables['BuildConfiguration'], 'release'))
      inputs:
        SourceFolder: $(Build.SourcesDirectory)\src\WinRT.Projection.Generator\bin\$(BuildConfiguration)\net10.0\win-$(BuildPlatform)\publish
        Contents: |
          cswinrtprojectiongen.exe
          cswinrtprojectiongen.pdb
        TargetFolder: $(StagingFolder)\net10.0\native

    - task: CopyFiles@2
      displayName: Stage WinRT.Generator.Tasks
      condition: and(succeeded(), eq(variables['BuildPlatform'], 'x86'), eq(variables['BuildConfiguration'], 'release'))
      inputs:
        SourceFolder: $(Build.SourcesDirectory)\src\WinRT.Generator.Tasks\bin\$(BuildConfiguration)\netstandard2.0
        Contents: |
          WinRT.Generator.Tasks.dll
          WinRT.Generator.Tasks.pdb
        TargetFolder: $(StagingFolder)\netstandard2.0

    # Build and stage merged Windows SDK projections for each supported OS version.
    # Package versions come from pipeline variables (SdkPackageVersion_XXXXX), which can be
    # overridden at queue time. Defaults are defined in CsWinRT-Variables.yml.
    - ${{ each sdkVersion in parameters.SdkProjectionVersions }}:
      - task: VSBuild@1
        displayName: Build WinRT.Sdk.Projection (${{ sdkVersion }})
        condition: and(succeeded(), eq(variables['BuildPlatform'], 'x86'), eq(variables['BuildConfiguration'], 'release'), eq(variables['_GenerateSdkProjection'], 'true'))
        inputs:
          solution: $(Build.SourcesDirectory)\src\WinRT.Sdk.Projection\WinRT.Sdk.Projection.csproj
          msbuildArgs: /restore /p:WindowsSdkBuild=${{ sdkVersion }} /p:SdkPackageVersion=$(SdkPackageVersion_${{ sdkVersion }}) /p:RestoreAdditionalProjectSources=$(_SdkNuGetFeed)
          platform: x86
          configuration: Release

      - task: VSBuild@1
        displayName: Build WinRT.Sdk.Xaml.Projection (${{ sdkVersion }})
        condition: and(succeeded(), eq(variables['BuildPlatform'], 'x86'), eq(variables['BuildConfiguration'], 'release'), eq(variables['_GenerateSdkProjection'], 'true'))
        inputs:
          solution: $(Build.SourcesDirectory)\src\WinRT.Sdk.Projection\WinRT.Sdk.Projection.csproj
          msbuildArgs: /restore /p:WindowsSdkBuild=${{ sdkVersion }} /p:SdkPackageVersion=$(SdkPackageVersion_${{ sdkVersion }}) /p:WindowsSdkXaml=true /p:RestoreAdditionalProjectSources=$(_SdkNuGetFeed)
          platform: x86
          configuration: Release

    # Build for additional OS version thats specified via variable to handle ones not added to the default list yet.
    # Set variables AdditionalSdkBuild (e.g. 28000) and AdditionalSdkPackageVersion (e.g. 10.0.28000.100)
    # at queue time to enable these steps.
    - task: VSBuild@1
      displayName: Build WinRT.Sdk.Projection ($(AdditionalSdkBuild))
      condition: and(succeeded(), ne(variables['AdditionalSdkBuild'], ''), ne(variables['AdditionalSdkPackageVersion'], ''), eq(variables['BuildPlatform'], 'x86'), eq(variables['BuildConfiguration'], 'release'), eq(variables['_GenerateSdkProjection'], 'true'))
      inputs:
        solution: $(Build.SourcesDirectory)\src\WinRT.Sdk.Projection\WinRT.Sdk.Projection.csproj
        msbuildArgs: /restore /p:WindowsSdkBuild=$(AdditionalSdkBuild) /p:SdkPackageVersion=$(AdditionalSdkPackageVersion) /p:RestoreAdditionalProjectSources=$(_SdkNuGetFeed)
        platform: x86
        configuration: Release

    - task: VSBuild@1
      displayName: Build WinRT.Sdk.Xaml.Projection ($(AdditionalSdkBuild))
      condition: and(succeeded(), ne(variables['AdditionalSdkBuild'], ''), ne(variables['AdditionalSdkPackageVersion'], ''), eq(variables['BuildPlatform'], 'x86'), eq(variables['BuildConfiguration'], 'release'), eq(variables['_GenerateSdkProjection'], 'true'))
      inputs:
        solution: $(Build.SourcesDirectory)\src\WinRT.Sdk.Projection\WinRT.Sdk.Projection.csproj
        msbuildArgs: /restore /p:WindowsSdkBuild=$(AdditionalSdkBuild) /p:SdkPackageVersion=$(AdditionalSdkPackageVersion) /p:WindowsSdkXaml=true /p:RestoreAdditionalProjectSources=$(_SdkNuGetFeed)
        platform: x86
        configuration: Release

    - task: CopyFiles@2
      displayName: Stage WinRT.Sdk.Projection (all SDK versions)
      condition: and(succeeded(), eq(variables['BuildPlatform'], 'x86'), eq(variables['BuildConfiguration'], 'release'), eq(variables['_GenerateSdkProjection'], 'true'))
      inputs:
        SourceFolder: $(Build.SourcesDirectory)\src\WinRT.Sdk.Projection\bin\Release
        Contents: |
          *\WinRT.Sdk.Projection.dll
          *\WinRT.Sdk.Xaml.Projection.dll
        TargetFolder: $(StagingFolder)\impl
