parameters: 
  - name: "BuildConfiguration"
    type: string
  - name: "BuildPlatform"
    type: string
  - name: "FunctionalTests"
    type: object
    default: 
    - JsonValueFunctionCalls
    - ClassActivation
    - Structs
    - Events
    - DynamicInterfaceCasting
    - Collections
    - Async
    - DerivedClassActivation
    - DerivedClassAsBaseClass
    - CCW

steps:
  - ${{ each functionalTest in parameters.FunctionalTests }}:
    - ${{ if or(eq(parameters.BuildPlatform, 'x86'), and(eq(parameters.BuildConfiguration, 'release'), eq(parameters.BuildPlatform, 'x64'))) }}:
      # Do restore separately to workaround issue where specifying TargetFramework causes nuget restore to propagate it to project references causing issues
      - task: MSBuild@1
        displayName: Restore ${{ functionalTest }}
        inputs:
          solution: $(Build.SourcesDirectory)\src\Tests\FunctionalTests\${{ functionalTest }}\${{ functionalTest }}.csproj
          msbuildArguments: /t:restore /p:CIBuildReason=CI,RuntimeIdentifier=win-${{ parameters.BuildPlatform }},solutiondir=$(Build.SourcesDirectory)\src\,VersionNumber=$(VersionNumber),VersionString=$(Build.BuildNumber),AssemblyVersionNumber=$(WinRT.Runtime.AssemblyVersion),GenerateTestProjection=true,AllowedReferenceRelatedFileExtensions=".xml;.pri;.dll.config;.exe.config"
          platform: ${{ parameters.BuildPlatform }}
          configuration: ${{ parameters.BuildConfiguration }}

    - ${{ if eq(parameters.BuildPlatform, 'x86') }}:
      - task: MSBuild@1
        displayName: Publish ${{ functionalTest }} trimmed (net10.0)
        inputs:
          solution: $(Build.SourcesDirectory)\src\Tests\FunctionalTests\${{ functionalTest }}\${{ functionalTest }}.csproj
          msbuildArguments: /t:publish /p:CIBuildReason=CI,RuntimeIdentifier=win-${{ parameters.BuildPlatform }},TargetFramework=net10.0,solutiondir=$(Build.SourcesDirectory)\src\,VersionNumber=$(VersionNumber),VersionString=$(Build.BuildNumber),AssemblyVersionNumber=$(WinRT.Runtime.AssemblyVersion),GenerateTestProjection=true,AllowedReferenceRelatedFileExtensions=".xml;.pri;.dll.config;.exe.config",PublishBuildTool=true,BuildToolArch=$(CsWinRTBuildToolsArch)
          platform: ${{ parameters.BuildPlatform }}
          configuration: ${{ parameters.BuildConfiguration }}

      - task: CmdLine@2
        displayName: Run ${{ functionalTest }} trimmed (net10.0)
        continueOnError: True
        inputs:
          workingDirectory: $(Build.SourcesDirectory)\src\Tests\FunctionalTests\${{ functionalTest }}\bin\${{ parameters.BuildConfiguration }}\net10.0\win-${{ parameters.BuildPlatform }}\publish
          script: |
            dir
            echo Running ${{ functionalTest }}.exe 
            ${{ functionalTest }}.exe 
            if %Errorlevel% NEQ 100 (
              exit /b !ErrorLevel!
            )
            exit /b 0 

      - task: CopyFiles@2
        displayName: Copy ${{ functionalTest }} trimmed (net10.0)
        condition: eq(variables['_PublishFunctionalTests'], 'true')
        inputs:
          SourceFolder: $(Build.SourcesDirectory)\src\Tests\FunctionalTests\${{ functionalTest }}\bin\${{ parameters.BuildConfiguration }}\net10.0\win-${{ parameters.BuildPlatform }}\publish
          TargetFolder: $(StagingFolder)\FunctionalTests\${{ functionalTest }}\

    - ${{ if and(eq(parameters.BuildConfiguration, 'release'), eq(parameters.BuildPlatform, 'x64')) }}:
      - task: MSBuild@1
        displayName: Publish ${{ functionalTest }} for AOT (net10.0)
        inputs:
          solution: $(Build.SourcesDirectory)\src\Tests\FunctionalTests\${{ functionalTest }}\${{ functionalTest }}.csproj
          msbuildArguments: /t:publish /p:CIBuildReason=CI,RuntimeIdentifier=win-${{ parameters.BuildPlatform }},TargetFramework=net10.0,solutiondir=$(Build.SourcesDirectory)\src\,VersionNumber=$(VersionNumber),VersionString=$(Build.BuildNumber),AssemblyVersionNumber=$(WinRT.Runtime.AssemblyVersion),GenerateTestProjection=true,AllowedReferenceRelatedFileExtensions=".xml;.pri;.dll.config;.exe.config",PublishBuildTool=true,BuildToolArch=$(CsWinRTBuildToolsArch)
          platform: ${{ parameters.BuildPlatform }}
          configuration: ${{ parameters.BuildConfiguration }}

      - task: CmdLine@2
        displayName: Run ${{ functionalTest }} for AOT (net10.0)
        continueOnError: True
        inputs:
          workingDirectory: $(Build.SourcesDirectory)\src\Tests\FunctionalTests\${{ functionalTest }}\bin\${{ parameters.BuildConfiguration }}\net10.0\win-${{ parameters.BuildPlatform }}\publish
          script: |
            dir
            echo Running ${{ functionalTest }}.exe 
            ${{ functionalTest }}.exe 
            if %Errorlevel% NEQ 100 (
              exit /b !ErrorLevel!
            )
            exit /b 0 

      - task: CopyFiles@2
        displayName: Copy ${{ functionalTest }} for AOT (net10.0)
        condition: eq(variables['_PublishFunctionalTests'], 'true')
        inputs:
          SourceFolder: $(Build.SourcesDirectory)\src\Tests\FunctionalTests\${{ functionalTest }}\bin\${{ parameters.BuildConfiguration }}\net10.0\win-${{ parameters.BuildPlatform }}\publish
          TargetFolder: $(StagingFolder)\FunctionalTests\${{ functionalTest }}\
